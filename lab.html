<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINESIS VFX | Team Portfolio</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    

    <style>
        /* --- SHARED STYLES --- */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-cyan: #00f3ff;
            --accent-amber: #ffae00;
            --shadow-light: rgba(255, 255, 255, 0.05);
            --shadow-dark: rgba(0, 0, 0, 0.6);
            --font-tech: 'Fira Code', monospace;
            --font-body: 'Inter', sans-serif;
            --font-logo: 'Oswald', sans-serif; /* Added for the new logo */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-repeat: repeat-y; opacity: 0.15; filter: grayscale(100%);
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light), 5px 5px 15px var(--shadow-dark);
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn {
            display: inline-block; padding: 12px 24px; font-family: var(--font-tech); font-size: 0.9rem;
            text-transform: uppercase; text-decoration: none; color: var(--accent-cyan);
            background: var(--panel-bg); border-radius: 4px; border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            transition: all 0.2s ease; cursor: pointer;
        }
        .btn:hover { box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); text-shadow: 0 0 5px var(--accent-cyan); }
        .btn:active { box-shadow: inset 3px 3px 7px var(--shadow-dark); transform: translateY(1px); }

        h1, h2, h3, .tech-font { font-family: var(--font-tech); letter-spacing: -0.5px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        header {
            padding: 20px 0; position: sticky; top: 0; z-index: 100;
            background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { 
            font-family: var(--font-logo); 
            font-weight: 700; 
            font-size: 1.5rem; 
            color: var(--text-main); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo span { color: var(--accent-cyan); }

        .nav-links a {
            color: var(--text-muted); text-decoration: none; margin-left: 20px;
            font-size: 0.9rem; transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-cyan); }

        /* --- LAB PAGE SPECIFIC --- */
        .lab-header { padding: 4rem 0 2rem; text-align: center; }
        .lab-header h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .lab-header p { color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light), 5px 5px 15px var(--shadow-dark);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-thumb {
            width: 100%;
            height: 200px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-family: var(--font-tech);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }
        
        .card-thumb img {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: opacity 0.3s;
        }
        .project-card:hover .card-thumb img { opacity: 1; }

        .card-content { padding: 1.5rem; }
        .card-content h3 { color: var(--accent-cyan); margin-bottom: 0.5rem; font-size: 1.1rem; }
        .card-content p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; }
        
        .tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
        .tag {
            font-size: 0.7rem;
            font-family: var(--font-tech);
            padding: 4px 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            color: var(--text-muted);
        }

        footer { text-align: center; padding: 3rem 0; margin-top: 4rem; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; color: var(--text-muted); }
        
        .loading { text-align: center; padding: 2rem; font-family: var(--font-tech); color: var(--accent-cyan); }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <header>
        <div class="container">
            <nav>
                <div class="logo">KINESIS <span>VFX</span></div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="lab.html">R&D Lab</a>
                    <a href="index.html#contact" class="btn" style="margin-left: 20px; padding: 8px 16px;">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="lab-header">
            <h1 class="tech-font">R&D / Pipeline Lab</h1>
            <p>Archives of proprietary tools, AI experiments, and technical demonstrations.</p>
        </div>

        <!-- Dynamic Grid Container -->
        <div id="project-grid" class="project-grid">
            <div class="loading">Initializing System...</div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 KINESIS VFX. All Systems Nominal.</p>
        </div>
    </footer>

    <script>
        fetch(`projects.json?t=${Date.now()}`)
            .then(response => response.json())
            .then(projects => {
                const grid = document.getElementById('project-grid');
                grid.innerHTML = ''; 

                projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    
                    const tagsHtml = project.tags.map(tag => 
                        `<span class="tag">${tag}</span>`
                    ).join('');

                    card.innerHTML = `
                        <div class="card-thumb">
                            <img src="${project.heroImage}" alt="${project.title}">
                        </div>
                        <div class="card-content">
                            <h3>${project.title}</h3>
                            <p>${project.description.substring(0, 100)}...</p>
                            <div class="tags">
                                ${tagsHtml}
                            </div>
                            <a href="project.html?id=${project.id}" class="btn" style="font-size: 0.8rem; padding: 8px 16px;">View...</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error loading projects:', error);
                document.getElementById('project-grid').innerHTML = '<p style="color:red">System Error: Could not load project data.</p>';
            });
    </script>
</body>
</html>
