<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINESIS VFX | Project Detail</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES --- */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-cyan: #00f3ff;
            --accent-amber: #ffae00;
            --shadow-light: rgba(255, 255, 255, 0.05);
            --shadow-dark: rgba(0, 0, 0, 0.6);
            --font-tech: 'Fira Code', monospace;
            --font-body: 'Inter', sans-serif;
            --font-logo: 'Oswald', sans-serif; /* Added for the new logo */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-repeat: repeat-y; opacity: 0.15; filter: grayscale(100%);
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: 
                inset 2px 2px 5px var(--shadow-dark),
                inset -2px -2px 5px var(--shadow-light),
                5px 5px 15px var(--shadow-dark);
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-family: var(--font-tech);
            font-size: 0.9rem;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--accent-cyan);
            background: var(--panel-bg);
            border-radius: 4px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 
                inset 2px 2px 5px var(--shadow-dark),
                inset -2px -2px 5px var(--shadow-light);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            text-shadow: 0 0 5px var(--accent-cyan);
        }

        .btn:active {
            box-shadow: inset 3px 3px 7px var(--shadow-dark);
            transform: translateY(1px);
        }

        h1, h2, h3, .tech-font { font-family: var(--font-tech); letter-spacing: -0.5px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        header {
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { 
            font-family: var(--font-logo); 
            font-weight: 700; 
            font-size: 1.5rem; 
            color: var(--text-main); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo span { color: var(--accent-cyan); }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-cyan); }

        /* --- PROJECT PAGE SPECIFIC --- */
        .project-hero {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 0;
        }

        .project-hero h1 { 
            font-size: 3.5rem; 
            margin-bottom: 0.5rem; 
            line-height: 1.1; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.8); 
        }
        
        .slogan {
            font-size: 1.2rem;
            color: var(--accent-cyan);
            font-family: var(--font-tech);
            margin-bottom: 2rem;
            display: block;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .hero-media-container {
            width: 100%;
            max-width: 900px;
            margin: 2rem auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-media-container img, .hero-media-container iframe {
            width: 100%;
            display: block;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .project-content {
            padding: 4rem 0;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .meta-tags {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .tag {
            font-size: 0.7rem;
            font-family: var(--font-tech);
            padding: 4px 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            color: var(--accent-cyan);
        }

        /* Dynamic Content Styling */
        .content-block {
            margin-bottom: 2rem;
        }
        .content-text {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
        }
        .content-media {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .content-media img, .content-media iframe {
            width: 100%;
            display: block;
            border-radius: 6px;
        }
        .media-caption {
            font-family: var(--font-tech);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .sidebar-info {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        footer { text-align: center; padding: 3rem 0; margin-top: 4rem; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; color: var(--text-muted); }
        
        .loading { text-align: center; padding: 4rem; font-family: var(--font-tech); color: var(--accent-cyan); }

        @media (max-width: 768px) {
            .project-hero h1 { font-size: 2.5rem; }
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <header>
        <div class="container">
            <nav>
                <div class="logo">KINESIS <span>VFX</span></div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="lab.html">R&D Lab</a>
                    <a href="index.html#contact" class="btn" style="margin-left: 20px; padding: 8px 16px;">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="project-hero">
        <div class="container">
            <h1 id="p-title" class="tech-font">Loading...</h1>
            <span id="p-slogan" class="slogan">Initializing...</span>
            <p id="p-desc" style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">...</p>

            <div class="hero-media-container">
                <div id="p-media"></div>
            </div>
        </div>
    </section>

    <!-- CONTENT SECTION -->
    <section class="project-content">
        <div class="container">
            <div class="content-grid">
                
                <div class="main-text">
                    <div id="p-tags" class="meta-tags"></div>

                    <!-- Dynamic Content Container -->
                    <div id="p-content-body"></div>
                </div>

                <div class="sidebar-info">
                    <div class="panel">
                        <h3 style="margin-bottom: 1rem;">Project Stats</h3>
                        <ul id="p-stats" style="list-style: none; color: var(--text-muted); line-height: 2;">
                            <!-- Stats injected here -->
                        </ul>
                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 1.5rem 0;">
                        <a href="lab.html" class="btn" style="width: 100%; text-align: center;">Back to Lab</a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 KINESIS VFX. All Systems Nominal.</p>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            document.body.innerHTML = '<div class="container" style="padding-top:100px; text-align:center;"><h1>404: Project Not Found</h1><a href="lab.html" class="btn">Return to Lab</a></div>';
        } else {
            fetch(`projects.json?t=${Date.now()}`)
                .then(response => response.json())
                .then(projects => {
                    const project = projects.find(p => p.id === projectId);

                    if (!project) {
                        document.body.innerHTML = '<div class="container" style="padding-top:100px; text-align:center;"><h1>404: Project Not Found</h1><a href="lab.html" class="btn">Return to Lab</a></div>';
                        return;
                    }

                    // Basic Info
                    document.title = `${project.title} | VFX Lab`;
                    document.getElementById('p-title').innerText = project.title;
                    document.getElementById('p-slogan').innerText = project.slogan;
                    document.getElementById('p-desc').innerText = project.description;

                    // Hero Media
                    const mediaContainer = document.getElementById('p-media');
                    if (project.videoUrl && project.videoUrl !== "") {
                        mediaContainer.innerHTML = `
                            <div class="video-wrapper">
                                <iframe src="${project.videoUrl}?controls=0&showinfo=0" title="Project Video" frameborder="0" allowfullscreen></iframe>
                            </div>
                        `;
                    } else {
                        mediaContainer.innerHTML = `<img src="${project.heroImage}" alt="${project.title}">`;
                    }

                    // Tags
                    const tagsContainer = document.getElementById('p-tags');
                    tagsContainer.innerHTML = project.tags.map(tag => 
                        `<span class="tag">${tag}</span>`
                    ).join('');

                    // --- Dynamic Content Rendering ---
                    const contentBody = document.getElementById('p-content-body');
                    contentBody.innerHTML = ''; // Clear loading

                    if (project.content && Array.isArray(project.content)) {
                        project.content.forEach(block => {
                            const blockDiv = document.createElement('div');
                            blockDiv.className = 'content-block';

                            if (block.type === 'text') {
                                blockDiv.innerHTML = `<p class="content-text">${block.text}</p>`;
                            } 
                            else if (block.type === 'image') {
                                let captionHtml = block.caption ? `<div class="media-caption">${block.caption}</div>` : '';
                                blockDiv.innerHTML = `
                                    <div class="content-media">
                                        <img src="${block.src}" alt="Project Detail">
                                    </div>
                                    ${captionHtml}
                                `;
                            } 
                            else if (block.type === 'video') {
                                blockDiv.innerHTML = `
                                    <div class="content-media">
                                        <div class="video-wrapper">
                                            <iframe src="${block.url}?controls=0&showinfo=0" title="Project Video" frameborder="0" allowfullscreen></iframe>
                                        </div>
                                    </div>
                                `;
                            }
                            else if (block.type === 'gif') {
                                let captionHtml = block.caption ? `<div class="media-caption">${block.caption}</div>` : '';
                                blockDiv.innerHTML = `
                                    <div class="content-media">
                                        <img src="${block.src}" alt="Animated GIF">
                                    </div>
                                    ${captionHtml}
                                `;
                            }

                            contentBody.appendChild(blockDiv);
                        });
                    } else {
                        // Fallback if no content array exists
                        contentBody.innerHTML = `<p class="content-text">${project.description}</p>`;
                    }

                    // Stats
                    const statsContainer = document.getElementById('p-stats');
                    const stats = project.stats;
                    statsContainer.innerHTML = `
                        <li><strong class="tech-font">Role:</strong> ${stats.role}</li>
                        <li><strong class="tech-font">Software:</strong> ${stats.software}</li>
                        <li><strong class="tech-font">Status:</strong> ${stats.status}</li>
                    `;
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.body.innerHTML = '<div class="container" style="padding-top:100px; text-align:center;"><h1>System Error</h1><p>Could not load project data.</p></div>';
                });
        }
    </script>
</body>
</html>
